<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miguel San Juan — Portfolio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0e0e0e;
  --white: #f2f2ed;
  --gray: #777;
  --dim: #2a2a2a;
  --line: #1c1c1c;
}
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  min-height: 100vh;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 56px;
  border-bottom: 1px solid var(--line);
  background: rgba(14,14,14,0.96);
  backdrop-filter: blur(8px);
}
.nav-logo { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
.nav-tabs { display: flex; gap: 0; }
.nav-tab {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray); text-decoration: none;
  padding: 8px 20px; border: 1px solid transparent;
  transition: all 0.2s;
}
.nav-tab:hover { color: var(--white); border-color: var(--dim); }

/* HERO */
.hero {
  padding: 80px 56px 64px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: flex-end;
}
.hero h1 {
  font-size: clamp(42px, 5.5vw, 76px);
  font-weight: 300; line-height: 1.08;
  letter-spacing: -0.03em;
}
.hero h1 em { font-style: italic; color: var(--gray); font-weight: 300; }
.hero-sub { font-size: 11px; color: var(--gray); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 16px; }
.hero-meta { text-align: right; font-size: 11px; color: var(--dim); letter-spacing: 0.1em; line-height: 2.2; }

/* STATS */
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--line);
}
.stat { padding: 24px 56px; border-right: 1px solid var(--line); }
.stat:last-child { border-right: none; }
.stat-n { font-size: 36px; font-weight: 300; line-height: 1; margin-bottom: 4px; }
.stat-l { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); }

/* SECTION LABEL */
.section-label {
  display: flex; justify-content: space-between; align-items: center;
  padding: 36px 56px 0;
}
.section-label h2 {
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray);
}
.section-label span { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }

/* AUDIO */
.audio-list { padding: 16px 56px 56px; }

.track {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 0 24px;
  border-bottom: 1px solid var(--line);
  padding: 28px 0;
  align-items: start;
}
.track:first-child { border-top: 1px solid var(--line); }
.track-num { font-size: 11px; color: var(--dim); padding-top: 2px; text-align: right; }
.track-body { display: flex; flex-direction: column; gap: 12px; width: 100%; min-width: 0; }
.track-name { font-size: 20px; font-weight: 300; letter-spacing: -0.01em; }
.track-file { font-size: 10px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.audio-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.ac-row { display: flex; align-items: center; gap: 14px; width: 100%; min-width: 0; }

.btn-play {
  width: 32px; height: 32px; flex-shrink: 0;
  background: none; border: 1px solid var(--dim);
  color: var(--white); cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.btn-play:hover, .btn-play.active { background: var(--white); color: var(--black); border-color: var(--white); }

.seekbar {
  flex: 1; min-width: 0;
  height: 1px; background: var(--dim);
  position: relative; cursor: pointer;
}
.seekbar::before { content: ''; position: absolute; top: -8px; bottom: -8px; left: 0; right: 0; }
.seek-fill { height: 100%; background: var(--white); width: 0%; pointer-events: none; transition: width 0.1s linear; }
.seek-head {
  width: 6px; height: 6px; background: var(--white); border-radius: 50%;
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  left: 0%; pointer-events: none; opacity: 0; transition: opacity 0.15s;
}
.seekbar:hover .seek-head { opacity: 1; }

.time-label { font-size: 10px; color: var(--gray); letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0; min-width: 80px; }

.vol-row { display: flex; align-items: center; gap: 8px; padding-left: 46px; }
.vol-label { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }
input[type=range].vol {
  -webkit-appearance: none; width: 80px; height: 1px;
  background: var(--dim); outline: none; cursor: pointer; border: none;
}
input[type=range].vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 9px; height: 9px;
  border-radius: 50%; background: var(--white); cursor: pointer;
}

/* VIDEO */
.video-grid {
  padding: 16px 56px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 2px;
}
.video-card { display: flex; flex-direction: column; }
.video-wrap { position: relative; background: #000; aspect-ratio: 16/9; overflow: hidden; }
.video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
.video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }

.video-bar { background: #111; border-top: 1px solid var(--line); padding: 14px 16px 12px; }
.vb-name { font-size: 15px; font-weight: 300; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vb-file { font-size: 9px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vb-controls { display: flex; align-items: center; gap: 10px; width: 100%; min-width: 0; }
.vb-controls .btn-play { width: 28px; height: 28px; font-size: 9px; }
.vb-seek { flex: 1; min-width: 0; height: 1px; background: var(--dim); position: relative; cursor: pointer; }
.vb-seek::before { content: ''; position: absolute; top: -8px; bottom: -8px; left: 0; right: 0; }
.vb-fill { height: 100%; background: var(--white); width: 0%; pointer-events: none; transition: width 0.1s linear; }
.vb-head { width: 6px; height: 6px; background: var(--white); border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%,-50%); left: 0%; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
.vb-seek:hover .vb-head { opacity: 1; }
.vb-time { font-size: 10px; color: var(--gray); white-space: nowrap; flex-shrink: 0; min-width: 80px; }
.vb-btn { background: none; border: 1px solid var(--dim); color: var(--gray); width: 26px; height: 26px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.vb-btn:hover { border-color: var(--white); color: var(--white); }

/* FOOTER */
footer {
  border-top: 1px solid var(--line);
  padding: 28px 56px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-name { font-size: 14px; font-weight: 300; font-style: italic; color: var(--gray); }
.footer-note { font-size: 10px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>

<nav>

<script>

  const a = document.getElementById('a-'+i);
  const pb = document.getElementById('pb-'+i);
  const sf = document.getElementById('sf-'+i);
  const sh = document.getElementById('sh-'+i);
  const tl = document.getElementById('tl-'+i);
  const sk = document.getElementById('sk-'+i);
  const vl = document.getElementById('vl-'+i);
  a.volume = 0.8;
  a.addEventListener('loadedmetadata', () => { tl.textContent = '0:00 / ' + fmt(a.duration); });
  a.addEventListener('timeupdate', () => {
    const p = a.duration ? (a.currentTime/a.duration)*100 : 0;
    sf.style.width = p+'%'; sh.style.left = p+'%';
    tl.textContent = fmt(a.currentTime) + ' / ' + fmt(a.duration);
  });
  a.addEventListener('ended', () => { pb.textContent='▶'; pb.classList.remove('active'); sf.style.width='0%'; sh.style.left='0%'; });
  pb.addEventListener('click', () => {
     pb.textContent='⏸'; pb.classList.add('active'); }
    else { a.pause(); pb.textContent='▶'; pb.classList.remove('active'); }
  });
  sk.addEventListener('click', e => {
    const r = sk.getBoundingClientRect();
    if (a.duration) a.currentTime = ((e.clientX-r.left)/r.width)*a.duration;
  });
  vl.addEventListener('input', () => { a.volume = vl.value; });
});


</script>

</html>
