<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miguel San Juan — Portfolio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0e0e0e;
  --white: #f2f2ed;
  --gray: #777;
  --dim: #2a2a2a;
  --line: #1c1c1c;
}
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  min-height: 100vh;
}
nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 56px;
  border-bottom: 1px solid var(--line);
  background: rgba(14,14,14,0.96);
  backdrop-filter: blur(8px);
}
.nav-logo { font-size: 15px; font-weight: 500; }
.nav-tabs { display: flex; }
.nav-tab {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray); text-decoration: none;
  padding: 8px 20px; border: 1px solid transparent; transition: all 0.2s;
}
.nav-tab:hover { color: var(--white); border-color: var(--dim); }
.hero {
  padding: 80px 56px 64px;
  border-bottom: 1px solid var(--line);
}
.hero h1 {
  font-size: clamp(42px, 5.5vw, 76px);
  font-weight: 300; line-height: 1.08; letter-spacing: -0.03em;
}
.hero h1 em { font-style: italic; color: var(--gray); font-weight: 300; }
.hero-sub { font-size: 11px; color: var(--gray); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 16px; }
.section-title {
  font-size: 10px; font-weight: 400; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--gray);
  padding: 36px 56px 0;
}
.audio-list { padding: 16px 56px 56px; }
.track {
  display: grid; grid-template-columns: 36px 1fr;
  gap: 0 24px; border-bottom: 1px solid var(--line);
  padding: 28px 0; align-items: start;
}
.track:first-child { border-top: 1px solid var(--line); }
.track-num { font-size: 11px; color: var(--dim); padding-top: 2px; text-align: right; }
.track-body { display: flex; flex-direction: column; gap: 12px; width: 100%; min-width: 0; }
.track-name { font-size: 20px; font-weight: 300; letter-spacing: -0.01em; }
.audio-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.ac-row { display: flex; align-items: center; gap: 14px; width: 100%; min-width: 0; }
.btn-play {
  width: 32px; height: 32px; flex-shrink: 0;
  background: none; border: 1px solid var(--dim);
  color: var(--white); cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.btn-play:hover, .btn-play.active { background: var(--white); color: var(--black); border-color: var(--white); }
.seekbar {
  flex: 1; min-width: 0; height: 1px; background: var(--dim);
  position: relative; cursor: pointer;
}
.seekbar::before { content: ''; position: absolute; top: -8px; bottom: -8px; left: 0; right: 0; }
.seek-fill { height: 100%; background: var(--white); width: 0%; pointer-events: none; transition: width 0.1s linear; }
.seek-head {
  width: 6px; height: 6px; background: var(--white); border-radius: 50%;
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  left: 0%; pointer-events: none; opacity: 0; transition: opacity 0.15s;
}
.seekbar:hover .seek-head { opacity: 1; }
.time-label { font-size: 10px; color: var(--gray); white-space: nowrap; flex-shrink: 0; min-width: 80px; }
.vol-row { display: flex; align-items: center; gap: 8px; padding-left: 46px; }
.vol-label { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }
input[type=range].vol {
  -webkit-appearance: none; width: 80px; height: 1px;
  background: var(--dim); outline: none; cursor: pointer; border: none;
}
input[type=range].vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 9px; height: 9px;
  border-radius: 50%; background: var(--white); cursor: pointer;
}
.video-grid {
  padding: 16px 56px 80px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 2px;
}
.video-card { display: flex; flex-direction: column; }
.video-wrap { position: relative; background: #000; aspect-ratio: 16/9; overflow: hidden; }
.video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
.video-bar { background: #111; border-top: 1px solid var(--line); padding: 14px 16px; }
.vb-name { font-size: 15px; font-weight: 300; }
footer {
  border-top: 1px solid var(--line); padding: 28px 56px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-name { font-size: 14px; font-weight: 300; font-style: italic; color: var(--gray); }
.footer-note { font-size: 10px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Miguel San Juan</div>
  <div class="nav-tabs">
    <a class="nav-tab" href="#audio">Audio</a>
    <a class="nav-tab" href="#video">Video</a>
  </div>
</nav>

<div class="hero">
  <h1>Audio<br><em>Engineering</em><br>Portfolio</h1>
  <div class="hero-sub">INF237 — 2026</div>
</div>

<div class="section-title" id="audio">Audio Tracks</div>
<div class="audio-list">

  <div class="track">
    <div class="track-num">01</div>
    <div class="track-body">
      <div class="track-name">Cut Up</div>
      <div class="audio-controls">
        <div class="ac-row">
          <button class="btn-play" id="pb-1">▶</button>
          <div class="seekbar" id="sk-1"><div class="seek-fill" id="sf-1"></div><div class="seek-head" id="sh-1"></div></div>
          <span class="time-label" id="tl-1">0:00 / 0:00</span>
        </div>
        <div class="vol-row"><span class="vol-label">VOL</span><input type="range" class="vol" id="vl-1" min="0" max="1" step="0.01" value="0.8"></div>
      </div>
      <audio id="a-1" src="Cut%20Up_SANJUAN_INF237.MP3" preload="metadata"></audio>
    </div>
  </div>

  <div class="track">
    <div class="track-num">02</div>
    <div class="track-body">
      <div class="track-name">Mashup</div>
      <div class="audio-controls">
        <div class="ac-row">
          <button class="btn-play" id="pb-2">▶</button>
          <div class="seekbar" id="sk-2"><div class="seek-fill" id="sf-2"></div><div class="seek-head" id="sh-2"></div></div>
          <span class="time-label" id="tl-2">0:00 / 0:00</span>
        </div>
        <div class="vol-row"><span class="vol-label">VOL</span><input type="range" class="vol" id="vl-2" min="0" max="1" step="0.01" value="0.8"></div>
      </div>
      <audio id="a-2" src="Mashup_SANJUAN_INF237.mp3" preload="metadata"></audio>
    </div>
  </div>

  <div class="track">
    <div class="track-num">03</div>
    <div class="track-body">
      <div class="track-name">Medley</div>
      <div class="audio-controls">
        <div class="ac-row">
          <button class="btn-play" id="pb-3">▶</button>
          <div class="seekbar" id="sk-3"><div class="seek-fill" id="sf-3"></div><div class="seek-head" id="sh-3"></div></div>
          <span class="time-label" id="tl-3">0:00 / 0:00</span>
        </div>
        <div class="vol-row"><span class="vol-label">VOL</span><input type="range" class="vol" id="vl-3" min="0" max="1" step="0.01" value="0.8"></div>
      </div>
      <audio id="a-3" src="Medley_SANJUAN_INF237.mp3" preload="metadata"></audio>
    </div>
  </div>

  <div class="track">
    <div class="track-num">04</div>
    <div class="track-body">
      <div class="track-name">Remix</div>
      <div class="audio-controls">
        <div class="ac-row">
          <button class="btn-play" id="pb-4">▶</button>
          <div class="seekbar" id="sk-4"><div class="seek-fill" id="sf-4"></div><div class="seek-head" id="sh-4"></div></div>
          <span class="time-label" id="tl-4">0:00 / 0:00</span>
        </div>
        <div class="vol-row"><span class="vol-label">VOL</span><input type="range" class="vol" id="vl-4" min="0" max="1" step="0.01" value="0.8"></div>
      </div>
      <audio id="a-4" src="Remix_SANJUAN_INF237.MP3" preload="metadata"></audio>
    </div>
  </div>

</div>

<div class="section-title" id="video">Video</div>
<div class="video-grid">

  <div class="video-card">
    <div class="video-wrap">
      <iframe src="https://drive.google.com/file/d/1-m4mV-mRUBbd-g-Jc3A9mK6i-antgfR3/preview" allow="autoplay" allowfullscreen></iframe>
    </div>
    <div class="video-bar"><div class="vb-name">Dubbing</div></div>
  </div>

  <div class="video-card">
    <div class="video-wrap">
      <iframe src="https://drive.google.com/file/d/1-sQfzBdRBjWXMkub9bX4ux1mdhRpjQvM/preview" allow="autoplay" allowfullscreen></iframe>
    </div>
    <div class="video-bar"><div class="vb-name">Foley</div></div>
  </div>

</div>

<footer>
  <div class="footer-name">Made by Miguel San Juan</div>
  <div class="footer-note">INF237 — 2026</div>
</footer>

<script>
function fmt(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function pauseAll(exceptId) {
  [1, 2, 3, 4].forEach(function(i) {
    var a = document.getElementById('a-' + i);
    if (a && !a.paused && i !== exceptId) {
      a.pause();
      var b = document.getElementById('pb-' + i);
      if (b) { b.textContent = '▶'; b.classList.remove('active'); }
    }
  });
}

[1, 2, 3, 4].forEach(function(i) {
  var a  = document.getElementById('a-'  + i);
  var pb = document.getElementById('pb-' + i);
  var sf = document.getElementById('sf-' + i);
  var sh = document.getElementById('sh-' + i);
  var tl = document.getElementById('tl-' + i);
  var sk = document.getElementById('sk-' + i);
  var vl = document.getElementById('vl-' + i);

  a.volume = 0.8;

  a.addEventListener('loadedmetadata', function() {
    tl.textContent = '0:00 / ' + fmt(a.duration);
  });

  a.addEventListener('timeupdate', function() {
    var p = a.duration ? (a.currentTime / a.duration) * 100 : 0;
    sf.style.width = p + '%';
    sh.style.left = p + '%';
    tl.textContent = fmt(a.currentTime) + ' / ' + fmt(a.duration);
  });

  a.addEventListener('ended', function() {
    pb.textContent = '▶';
    pb.classList.remove('active');
    sf.style.width = '0%';
    sh.style.left = '0%';
  });

  pb.addEventListener('click', function() {
    if (a.paused) {
      pauseAll(i);
      a.play();
      pb.textContent = '⏸';
      pb.classList.add('active');
    } else {
      a.pause();
      pb.textContent = '▶';
      pb.classList.remove('active');
    }
  });

  sk.addEventListener('click', function(e) {
    var r = sk.getBoundingClientRect();
    if (a.duration) a.currentTime = ((e.clientX - r.left) / r.width) * a.duration;
  });

  vl.addEventListener('input', function() {
    a.volume = vl.value;
  });
});
</script>
</body>
</html>
